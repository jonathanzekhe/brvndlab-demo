<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brvndlab</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0a0a0a;
            color: #f5f5f7;
            font-weight: 300;
            margin: 0;
            min-height: 100vh;
            overflow: hidden;
        }

        .serif { font-family: 'Cormorant Garamond', serif; }

        .grain {
            position: fixed;
            inset: 0;
            opacity: 0.04;
            pointer-events: none;
            mix-blend-mode: overlay;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        .gold-line {
            display: inline-block;
            width: 40px;
            height: 1px;
            background: linear-gradient(90deg, transparent, #c9a875, transparent);
        }

        .vignette {
            position: fixed;
            inset: 0;
            pointer-events: none;
            background: radial-gradient(ellipse at center, transparent 0%, transparent 50%, rgba(0,0,0,0.6) 100%);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-in { animation: fadeIn 1.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; }
        .delay-1 { animation-delay: 0.4s; }
        .delay-2 { animation-delay: 0.9s; }
        .delay-3 { animation-delay: 1.4s; }
        .delay-4 { animation-delay: 1.9s; }

        .btn-old-money {
            border: 1px solid rgba(255,255,255,0.3);
            color: #f5f5f7;
            background: transparent;
            transition: all 0.4s ease;
            letter-spacing: 0.02em;
        }
        .btn-old-money:hover {
            background: #f5f5f7;
            color: #0a0a0a;
            border-color: #f5f5f7;
        }
    </style>
</head>
<body class="relative">

    <div class="vignette"></div>
    <div class="grain"></div>

    <header class="absolute top-0 left-0 right-0 p-10 z-50 flex items-center">
        <div class="flex items-center gap-3">
            <div class="w-7 h-7 rounded-md bg-[#c9a875] flex items-center justify-center">
                <span class="text-[#0a0a0a] font-bold text-[11px]">B</span>
            </div>
            <span class="text-white text-[15px] font-light tracking-wide">Brvndlab</span>
        </div>
    </header>

    <main class="relative z-10 min-h-screen flex flex-col items-center justify-center text-center px-8">

        <div class="fade-in mb-12">
            <span class="gold-line"></span>
        </div>

        <h1 class="fade-in delay-1 serif italic text-[88px] leading-[0.95] font-light text-white tracking-tight mb-10 max-w-4xl">
            Avant de commencer.
        </h1>

        <p class="fade-in delay-2 text-[17px] text-white/55 leading-relaxed max-w-md mb-16 font-light">
            Sept minutes pour qu'on parte du bon pied.
        </p>

        <button class="fade-in delay-3 btn-old-money px-10 py-3.5 rounded-full text-[13px] font-normal">
            Je suis prêt
        </button>

    </main>

</body>
</html>
