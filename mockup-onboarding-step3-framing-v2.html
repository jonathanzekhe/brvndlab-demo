<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brvndlab, on y est</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #260600;
            color: #f5f5f7;
            overflow: hidden;
            margin: 0;
            min-height: 100vh;
        }

        .sun-layer-1 {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 900px;
            height: 900px;
            border-radius: 50%;
            background: radial-gradient(circle at center, rgba(252, 211, 77, 0.85) 0%, rgba(249, 115, 22, 0.6) 30%, rgba(220, 38, 38, 0.2) 60%, transparent 80%);
            filter: blur(100px);
            pointer-events: none;
        }

        .sun-layer-2 {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 1200px;
            height: 1200px;
            border-radius: 50%;
            background: radial-gradient(circle at center, rgba(249, 115, 22, 0.5) 0%, rgba(234, 88, 12, 0.3) 40%, transparent 70%);
            filter: blur(140px);
            pointer-events: none;
        }

        .sun-layer-3 {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 1600px;
            height: 1600px;
            border-radius: 50%;
            background: radial-gradient(circle at center, rgba(220, 38, 38, 0.25) 0%, rgba(124, 45, 18, 0.15) 50%, transparent 80%);
            filter: blur(226px);
            pointer-events: none;
        }

        .grain {
            position: absolute;
            inset: 0;
            opacity: 0.06;
            pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        @keyframes breathe {
            0%, 100% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 0.95; transform: translate(-50%, -50%) scale(1.02); }
        }
        .breathe { animation: breathe 8s ease-in-out infinite; }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-in { animation: fadeInUp 1.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; }
        .delay-1 { animation-delay: 0.3s; }
        .delay-2 { animation-delay: 0.6s; }
        .delay-3 { animation-delay: 1s; }
    </style>
</head>
<body class="relative">

    <div class="sun-layer-3 breathe"></div>
    <div class="sun-layer-2 breathe" style="animation-delay: 1s;"></div>
    <div class="sun-layer-1 breathe" style="animation-delay: 2s;"></div>
    <div class="grain"></div>

    <header class="absolute top-0 left-0 right-0 p-10 z-50 flex items-center">
        <div class="flex items-center gap-3">
            <div class="w-9 h-9 rounded-lg bg-[#f97316] flex items-center justify-center shadow-[0_0_20px_rgba(249,115,22,0.5)]">
                <span class="text-white font-black text-sm">B</span>
            </div>
            <span class="font-bold tracking-tight text-white text-xl">Brvndlab</span>
        </div>
    </header>

    <main class="relative z-10 min-h-screen flex flex-col items-center justify-center text-center px-8">

        <h1 class="fade-in text-[120px] leading-[0.95] font-extrabold text-white tracking-tighter mb-12 max-w-5xl">
            On y est.
        </h1>

        <p class="fade-in delay-1 text-[20px] text-white/70 leading-relaxed max-w-xl mb-16">
            Il prend 7 minutes. Il est dense. Il va déterminer la qualité de tout ce qu'on va construire ensemble.
        </p>

        <button class="fade-in delay-2 group relative bg-white text-[#260600] px-12 py-5 rounded-full text-base font-bold hover:scale-[1.03] active:scale-[0.98] transition-all shadow-[0_0_60px_rgba(255,255,255,0.2)]">
            Je suis prêt
        </button>

    </main>

</body>
</html>
